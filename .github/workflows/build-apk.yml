name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor packages
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Init Capacitor
        run: npx cap init "Apex Markets" "com.apexmarkets.app" --web-dir=out

      - name: Add Android platform
        run: npx cap add android

      - name: Set server URL in config
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
            config.server = { url: 'https://your-actual-vercel-url.vercel.app', cleartext: false };
            fs.writeFileSync('capacitor.config.json', JSON.stringify(config, null, 2));
          "

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apex-markets-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
