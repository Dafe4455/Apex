name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor packages
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Write capacitor config
        run: |
          echo '{
            "appId": "com.apexmarkets.app",
            "appName": "Apex Markets",
            "webDir": "out",
            "server": {
              "url": "https://stock-broker-liart.vercel.app",
              "cleartext": false
            }
          }' > capacitor.config.json

      - name: Add Android platform
        run: npx cap add android

      - name: Create assets directory
        run: mkdir -p android/app/src/main/assets

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          rm -rf ~/.gradle/caches
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apex-markets-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
